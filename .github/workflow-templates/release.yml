# Tag-driven release pipeline:
#   1. Push the multi-arch image to Docker Hub (with description sync).
#   2. Publish the source tree as a Balena block.
#   3. Create/update the GitHub Release with rendered notes.
#
# Required repo configuration:
#   vars     IMAGE_NAME           Docker image name (no namespace)
#            DOCKERHUB_NAMESPACE  Docker Hub namespace for the image
#            BALENA_BLOCK_NAME    Balena block slug (without namespace)
#            BALENA_NAMESPACE     Balena user/org that owns the block
#   secrets  DOCKERHUB_USERNAME   Docker Hub user with write access
#            DOCKERHUB_TOKEN      Docker Hub access token (never the password)
#            BALENA_API_TOKEN     balenaCloud API token
name: Release (tag-driven)

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.2.3).'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve tag
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag_name: ${{ steps.tag.outputs.value }}
      version:  ${{ steps.tag.outputs.version }}
    steps:
      - id: tag
        env:
          EVENT_NAME:   ${{ github.event_name }}
          REF_NAME:     ${{ github.ref_name }}
          RELEASE_TAG:  ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          case "${EVENT_NAME}" in
            push)              TAG="${REF_NAME}" ;;
            release)           TAG="${RELEASE_TAG}" ;;
            workflow_dispatch) TAG="${DISPATCH_TAG}" ;;
            *) echo "ERROR: unsupported event '${EVENT_NAME}'" >&2; exit 1 ;;
          esac
          if ! printf '%s' "${TAG}" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?$'; then
            echo "ERROR: tag '${TAG}' is not a SemVer release tag" >&2
            exit 1
          fi
          {
            echo "value=${TAG}"
            echo "version=${TAG#v}"
          } >> "${GITHUB_OUTPUT}"

  docker:
    name: Docker Hub
    needs: resolve
    uses: blackoutsecure/platform-automation/.github/workflows/docker-build-push.yml@main
    with:
      image_name:          ${{ vars.IMAGE_NAME }}
      dockerhub_namespace: ${{ vars.DOCKERHUB_NAMESPACE }}
      image_version:       ${{ needs.resolve.outputs.version }}
      push:                'true'
      extra_tags:          sha-${{ github.sha }}
      short_description:   ${{ github.event.repository.description }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}

  balena:
    name: Balena block
    needs: [resolve, docker]
    permissions:
      contents: write
    uses: blackoutsecure/platform-automation/.github/workflows/balena-block-publish.yml@main
    with:
      block_name:       ${{ vars.BALENA_BLOCK_NAME }}
      balena_namespace: ${{ vars.BALENA_NAMESPACE }}
      version:          ${{ needs.resolve.outputs.version }}
      publish:          'true'
    secrets:
      BALENA_API_TOKEN: ${{ secrets.BALENA_API_TOKEN }}

  github-release:
    name: GitHub Release
    needs: [resolve, docker, balena]
    permissions:
      contents: write
    uses: blackoutsecure/platform-automation/.github/workflows/github-release.yml@main
    with:
      tag_name:               ${{ needs.resolve.outputs.tag_name }}
      version:                ${{ needs.resolve.outputs.version }}
      image_ref:              ${{ needs.docker.outputs.image }}
      platforms:              linux/amd64,linux/arm64
      generate_release_notes: true
